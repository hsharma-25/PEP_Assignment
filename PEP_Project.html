<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Static Website</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: #fff;
      padding: 1rem 0;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #555;
    }

    nav a {
      color: #fff;
      padding: 1rem;
      text-decoration: none;
    }

    nav a:hover {
      background: #333;
    }

    .container {
      padding: 2rem;
    }

    .card {
      background: #fff;
      padding: 1.5rem;
      margin: 1rem 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    button {
      padding: 0.7rem 1.2rem;
      border: none;
      background: #333;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #555;
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: #333;
      color: #fff;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Harsh Sharma</h1>
  <p>A simple static website</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#about">About</a>
  <a href="#contact">Contact</a>
</nav>

<div class="container">
  <div class="card">
    <h2>Welcome</h2>
    <p>This is a simple static website built for the assignment submission of PEP classes.</p>
    <button onclick="showMessage()">Click Me</button>
  </div>

  <div class="card" id="about">
    <h2>About</h2>
    <p>Made by Harsh Sharma. Deployed using EC2 instance with an Elastic IP. </p>
  </div>

  <div class="card" id="contact">
    <h2>Contact</h2>
    <p>Email: harsh.sharma25090925@gmail.com</p>
  </div>
</div>

<footer>
  <p>© 2026 Harsh Sharma</p>
</footer>

<script>
  function showMessage() {
    alert("Hello! Harsh this side 🎉");
  }
</script>

</body>
</html>
